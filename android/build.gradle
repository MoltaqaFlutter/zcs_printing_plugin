group 'com.example.zcs_printing'
version '1.0-SNAPSHOT'

buildscript {
    ext.kotlin_version = '1.9.0'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

def pluginProjectDir = projectDir

rootProject.allprojects {
    repositories {
        maven {
            url "${pluginProjectDir}/maven_repo"
        }
    }
}

android {
    namespace 'com.example.zcs_printing'
    compileSdkVersion 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        minSdkVersion 23
    }
}

dependencies {
    // ZCS SDK - implementation so the AAR is supplied transitively to apps that use the plugin
    implementation 'com.example.zcs:smartpos:2.0.1_R251024'
    implementation 'com.example.zcs:emv:2.0.1_R251023'
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    
    // Android PrintHelper for system print
    implementation 'androidx.print:print:1.1.0'
    // Note: ZXing is already included in SmartPos SDK, so we don't add it separately
}
